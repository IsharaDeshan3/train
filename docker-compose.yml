version: '3.8'

services:
  # ─── Application ─────────────────────────────────────────────────────────
  train-service:
    build: .
    container_name: train-service
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # MongoDB — required primary database
      - MONGO_URI=mongodb://mongo:27017/train_management
      # Kafka — event broker for domain events
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_ENABLED=true
      - KAFKA_CLIENT_ID=train-management-service
      # Redis — optional schedule-search cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Security
      - SERVICE_API_KEY=change-me-in-production
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - train-network

  # ─── MongoDB ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: train-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - train-network

  # ─── ZooKeeper (required by Kafka in KRaft-less mode) ───────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: train-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - train-network

  # ─── Kafka ───────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: train-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      # PLAINTEXT — internal container-to-container; PLAINTEXT_HOST — host access
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - train-network

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: train-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - train-network

volumes:
  mongodata:
  redisdata:

networks:
  train-network:
    driver: bridge
