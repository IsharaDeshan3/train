version: '3.8'

services:
  train-service:
    build: .
    container_name: train-service
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=train_management
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - train-network

  db:
    image: postgres:15-alpine
    container_name: train-db
    environment:
      - POSTGRES_DB=train_management
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - train-network

  redis:
    image: redis:7-alpine
    container_name: train-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - train-network

volumes:
  pgdata:
  redisdata:

networks:
  train-network:
    driver: bridge
