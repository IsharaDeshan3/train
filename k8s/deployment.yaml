apiVersion: apps/v1
kind: Deployment
metadata:
  name: train-service
  labels:
    app: train-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: train-service
  template:
    metadata:
      labels:
        app: train-service
    spec:
      containers:
        - name: train-service
          image: nightmarekd/train-service:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: train-service-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "train_management"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: train-service-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: train-service-secrets
                  key: db-password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: train-service-secrets
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
